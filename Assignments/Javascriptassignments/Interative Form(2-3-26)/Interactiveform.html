<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form</title>
    <link rel="stylesheet" href="interactive.css">
</head>
<body>
    <div class="container">
      <h2>Registration Form</h2>
    <br>
    <br>
<form onsubmit="return validateForm()">
   <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter your Name"><br><br>
    <label for="email">Email:</label>
    <input type="text" id="email" placeholder="Enter your Email"><br><br>
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter your password"><br><br>
    <label for="confirmPassword">Confirm Password:</label>
    <input type="password" id="confirmPassword" placeholder="Confirm your password"><br><br>
    <input type="submit" value="Submit">

</form>
<p id="message"></p>
</div>
<script src="script.js"></script>

</body>
</html>
